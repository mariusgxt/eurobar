  <g
     id="EuropeanFlag"
     stroke="none"
     stroke-width="0">
    <title
       id="title1">Vertical Flag of Europe, by Adam Stanislav</title>
    <desc
       id="desc1">A vertical version of the flag of Europe. There are no official specifications for the vertical flag. So, we shall keep the standard specs for the stars, reduce the width from three units to two units and increase the height from two units to five units. We will place the center of the star circle one unit from the left and five thirds units from the top (that is, in the center of the width and one third of the height from the top).</desc>
